name: "Validate design (T1)"

# Deterministic Tier-1 gate (DesValidator) for Stage 3 output. Runs on every PR
# (no path filter) so it can serve as an always-reported REQUIRED status check on
# `main` without deadlocking PRs that don't touch the design specs.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-design:
    name: "Validate design"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: pip install pyyaml jsonschema

      - name: Compile check (designs in sync with the approved feature source)
        run: python scripts/compile_design.py --check

      - name: Validate design specs
        run: python scripts/validate_design.py
