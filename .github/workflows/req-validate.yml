name: "Validate requirements (T1)"

# Deterministic Tier-1 gate for Stage 1/2 output. Runs on every PR (no path
# filter) so it can serve as an always-reported REQUIRED status check on `main`
# without deadlocking PRs that don't touch the requirement set.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-requirements:
    name: "Validate requirements"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: pip install pyyaml jsonschema

      - name: Validate REQ files
        run: python scripts/validate_reqs.py
