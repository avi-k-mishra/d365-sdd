name: "Validate features (T1)"

# Deterministic Tier-1 gate for Stage 2 output. Runs on every PR (no path
# filter) so it can serve as an always-reported REQUIRED status check on `main`
# without deadlocking PRs that don't touch the feature specs.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: pip install pyyaml jsonschema

      - name: Compile check (specs in sync with REQ source)
        run: python scripts/compile_specs.py --check

      - name: Validate feature specs
        run: python scripts/validate_specs.py
